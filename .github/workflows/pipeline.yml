name: CI/CD — cyna-api

on:
  push:
    branches: [main, dev]

env:
  FULL_IMAGE: ghcr.io/nizardv/cyna-api

jobs:
  # ══════════════════════════════════════════
  # CI — Build, Test, Push
  # ══════════════════════════════════════════
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use .NET SDK 10.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: SonarCloud Analyze
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=2028di1p5g3
            -Dsonar.projectKey=2028DI1P5G3_Cyna-Api
            -Dsonar.projectName=CYNA - Backend Web

      - name: dotnet restore
        run: dotnet restore CynaApi.sln

      - name: dotnet build
        run: dotnet build CynaApi.sln --configuration Release --no-restore

      - name: dotnet test
        run: dotnet test UnitTests/UnitTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"
        continue-on-error: true

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: NizardV
          password: ${{ secrets.GHCR_PAT }}

      - name: Set env tag
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "tag=prod" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Docker Build & Push
        run: |
          ENV_TAG=${{ steps.env.outputs.tag }}
          docker build \
            -t $FULL_IMAGE:$ENV_TAG \
            -t $FULL_IMAGE:sha-${{ github.sha }} \
            -t $FULL_IMAGE:build-${{ github.run_id }} \
            .
          docker push $FULL_IMAGE:$ENV_TAG
          docker push $FULL_IMAGE:sha-${{ github.sha }}
          docker push $FULL_IMAGE:build-${{ github.run_id }}

  # ══════════════════════════════════════════
  # CD STAGING — déclenché sur dev
  # ══════════════════════════════════════════
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Generate .env.staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          envs: DB_PASSWORD,JWT_SECRET_KEY,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,RESEND_API_KEY,RESEND_FROM,STRIPE_PUBLISHABLE_KEY
          script: |
            cat > ~/cyna-infra/docker-compose/.env.staging << EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD_STAGING }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY_STAGING }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY_STAGING }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET_STAGING }}
            API_PORT=4001
            ASPNETCORE_ENVIRONMENT=Staging
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY_STAGING }}
            RESEND_FROM=${{ secrets.RESEND_FROM_STAGING }}
            STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY_STAGING }}
            VITE_APP_TITLE=Cyna [Staging]
            VITE_APP_DESCRIPTION=Vente de solutions SaaS de cybersécurité
            EOF

      - name: Deploy API staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u NizardV --password-stdin
            cd ~/cyna-infra && git pull origin main
            cd docker-compose/
            echo "─── Pull & Relance API staging sur le port 4001 ───"
            docker compose -p cyna-staging -f docker-compose.staging.yml --env-file .env.staging pull api
            docker compose -p cyna-staging -f docker-compose.staging.yml --env-file .env.staging up -d --no-build --force-recreate api

      - name: Health check staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            sleep 10
            curl -f http://localhost:4001/health || exit 1

  # ══════════════════════════════════════════
  # CD PROD — déclenché sur main
  # ══════════════════════════════════════════
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate .env.prod
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            cat > ~/cyna-infra/docker-compose/.env.prod << EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD_PROD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY_PROD }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY_PROD }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET_PROD }}
            API_PORT=4000
            ASPNETCORE_ENVIRONMENT=Production
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY_PROD }}
            RESEND_FROM=${{ secrets.RESEND_FROM_PROD }}
            ADMIN_SEED_PASSWORD=${{ secrets.ADMIN_SEED_PASSWORD }}
            STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY_PROD }}
            VITE_APP_TITLE=Cyna
            VITE_APP_DESCRIPTION=Vente de solutions SaaS de cybersécurité
            EOF

      - name: Versioning — Calcul et tag Git
        id: version
        run: |
          git fetch --tags
          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^api/v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          [ -z "$LAST_TAG" ] && LAST_TAG="api/v0.0.0"

          VERSION=${LAST_TAG#api/v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
          BUMP="patch"
          echo "$COMMITS" | grep -qE '^feat!:|^fix!:|^refactor!:' && BUMP="major"
          echo "$COMMITS" | grep -qE '^feat:' && [ "$BUMP" != "major" ] && BUMP="minor"

          case $BUMP in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="api/${NEW_VERSION}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW_TAG
          git push origin $NEW_TAG
          echo "Tag $NEW_TAG créé ✅"

      - name: Tag image Docker avec version
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u NizardV --password-stdin
          docker pull $FULL_IMAGE:prod
          docker tag $FULL_IMAGE:prod $FULL_IMAGE:${{ steps.version.outputs.new_version }}
          docker push $FULL_IMAGE:${{ steps.version.outputs.new_version }}

      - name: Deploy API prod
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u NizardV --password-stdin
            cd ~/cyna-infra && git pull origin main
            cd docker-compose/
            echo "─── Pull & Relance API prod sur le port 4000 ───"
            docker compose -p cyna-prod -f docker-compose.prod.yml --env-file .env.prod pull api
            docker compose -p cyna-prod -f docker-compose.prod.yml --env-file .env.prod up -d --no-build --force-recreate api

      - name: Health check prod
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            sleep 10
            curl -f http://localhost:4000/health || exit 1
