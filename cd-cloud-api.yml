trigger: none

resources:
  pipelines:
  - pipeline: 'ci-api'
    source: 'Cyna-Api CI'
    trigger:
      branches:
        include: [ "main", "dev" ]

pool:
  name: 'CyanPool'

variables:
  - group: 'GHCR'
  - name: FULL_IMAGE
    value: 'ghcr.io/nizardv/cyna-api'
  # On récupère la branche brute sans logique complexe ici
  - name: RAW_BRANCH
    value: $(resources.pipeline['ci-api'].sourceBranch)

stages:
- stage: CD_Cloud
  displayName: 'CD Cloud — Deploy OVH'
  jobs:
  - deployment: Deploy
    # On cible un environnement générique ou déterminé par une variable d'exécution
    environment: 'OVH-Cloud'
    strategy:
      runOnce:
        deploy:
          steps:
          # ── STEP 1 : Calcul des variables en Bash ──
          - bash: |
              # Extraction du nom de la branche (ex: refs/heads/main -> main)
              BRANCH_NAME=$(echo "$(RAW_BRANCH)" | sed 's|refs/heads/||')
              echo "Pipeline déclenché par la branche : $BRANCH_NAME"
              
              if [ "$BRANCH_NAME" = "main" ]; then
                echo "##vso[task.setvariable variable=envName]prod"
                echo "##vso[task.setvariable variable=targetEnv]PROD"
                echo "##vso[task.setvariable variable=API_PORT]4000"
                echo "##vso[task.setvariable variable=ASPNETCORE_ENV]Production"
              else
                echo "##vso[task.setvariable variable=envName]staging"
                echo "##vso[task.setvariable variable=targetEnv]DEV"
                echo "##vso[task.setvariable variable=API_PORT]4001"
                echo "##vso[task.setvariable variable=ASPNETCORE_ENV]Staging"
              fi
            displayName: 'Calcul dynamique de l’environnement cible'

          # ── STEP 2 : Déploiement SSH ──
          - task: SSH@0
            displayName: 'Deploy API sur OVH via Docker Compose'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                echo "$(GHCR_PAT)" | docker login ghcr.io -u NizardV --password-stdin

                cd ~/cyna-infra
                git pull origin main
                cd docker-compose/

                echo "─── Pull & Relance de l'API ($(envName)) sur le port $(API_PORT) ───"
                ENV_NAME=$(envName) \
                API_PORT=$(API_PORT) \
                ASPNETCORE_ENVIRONMENT=$(ASPNETCORE_ENV) \
                  docker compose -f docker-compose.$(envName).yml pull api

                ENV_NAME=$(envName) \
                API_PORT=$(API_PORT) \
                ASPNETCORE_ENVIRONMENT=$(ASPNETCORE_ENV) \
                  docker compose -f docker-compose.$(envName).yml up -d --no-build --force-recreate

          # ── STEP 3 : Health check ──
          - task: SSH@0
            displayName: 'Health check post-deploy'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                sleep 5
                curl -f http://localhost:$(API_PORT)/health || exit 1