trigger: none
resources:
  pipelines:
  - pipeline: 'ci-api'
    source: 'Cyna-Api CI'
    trigger:
      branches:
        include: [ "main", "dev" ]
pool:
  name: 'CyanPool'
variables:
  - group: 'GHCR'
  - name: FULL_IMAGE
    value: 'ghcr.io/nizardv/cyna-api'

stages:
- stage: CD_Cloud
  displayName: 'CD Cloud — Deploy OVH'
  jobs:
  # ══════════════════════════════════════════
  # JOB STAGING — déclenché sur dev
  # ══════════════════════════════════════════
  - deployment: DeployStaging
    displayName: 'Deploy Staging'
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/dev')
    environment: 'OVH-Cloud'
    variables:
      - group: 'CYNA-STAGING'
    strategy:
      runOnce:
        deploy:
          steps:
          # ── STEP 1 : Écriture du .env.staging sur le VPS ──
          - task: SSH@0
            displayName: 'Écriture du .env.staging'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                cat > ~/cyna-infra/docker-compose/.env.staging << EOF
                DB_PASSWORD=$DB_PWD
                JWT_SECRET_KEY=$JWT_KEY
                STRIPE_SECRET_KEY=$STRIPE_SK
                STRIPE_WEBHOOK_SECRET=$STRIPE_WH
                API_PORT=4001
                ASPNETCORE_ENVIRONMENT=Staging
                EOF
                echo ".env.staging écrit ✅"
            env:
              DB_PWD:    $(DB_PASSWORD_STAGING)
              JWT_KEY:   $(JWT_SECRET_KEY_STAGING)
              STRIPE_SK: $(STRIPE_SECRET_KEY_STAGING)
              STRIPE_WH: $(STRIPE_WEBHOOK_SECRET_STAGING)

          # ── STEP 2 : Déploiement ──
          - task: SSH@0
            displayName: 'Deploy API staging'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                echo "$GHCR_PAT_ENV" | docker login ghcr.io -u NizardV --password-stdin
                cd ~/cyna-infra && git pull origin main
                cd docker-compose/
                echo "─── Pull & Relance API staging sur le port 4001 ───"
                docker compose -p cyna-staging -f docker-compose.staging.yml --env-file .env.staging pull api
                docker compose -p cyna-staging -f docker-compose.staging.yml --env-file .env.staging up -d --no-build --force-recreate api
            env:
              GHCR_PAT_ENV: $(GHCR_PAT)

          # ── STEP 3 : Health check ──
          - task: SSH@0
            displayName: 'Health check staging'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                sleep 10
                curl -f http://localhost:4001/health || exit 1

  # ══════════════════════════════════════════
  # JOB PROD — déclenché sur main
  # ══════════════════════════════════════════
  - deployment: DeployProd
    displayName: 'Deploy Production'
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    environment: 'OVH-Cloud'
    variables:
      - group: 'CYNA-PROD'
    strategy:
      runOnce:
        deploy:
          steps:
          # ── STEP 1 : Versioning ──
          - bash: |
              git fetch --tags
              LAST_TAG=$(git tag --sort=-v:refname | grep -E '^api/v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)

              if [ -z "$LAST_TAG" ]; then
                LAST_TAG="api/v0.0.0"
                echo "Aucun tag trouvé, départ depuis $LAST_TAG"
              fi

              VERSION=${LAST_TAG#api/v}
              MAJOR=$(echo $VERSION | cut -d. -f1)
              MINOR=$(echo $VERSION | cut -d. -f2)
              PATCH=$(echo $VERSION | cut -d. -f3)

              COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
              BUMP="patch"
              if echo "$COMMITS" | grep -qE '^feat!:|^fix!:|^refactor!:'; then
                BUMP="major"
              elif echo "$COMMITS" | grep -qE '^feat:'; then
                BUMP="minor"
              fi

              case $BUMP in
                major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR+1)); PATCH=0 ;;
                patch) PATCH=$((PATCH+1)) ;;
              esac

              NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
              NEW_TAG="api/${NEW_VERSION}"
              echo "##vso[task.setvariable variable=NEW_VERSION]$NEW_VERSION"
              echo "##vso[task.setvariable variable=NEW_TAG]$NEW_TAG"

              curl -s -X POST \
                "https://dev.azure.com/2028DI1P5G3/DIIAGE%202028%20DI1%20P5%20G3/_apis/git/repositories/Cyna-Api/refs?api-version=7.1" \
                -H "Content-Type: application/json" \
                -H "Authorization: Basic $(echo -n ":$(ADO_PAT)" | base64)" \
                -d "[{
                  \"name\": \"refs/tags/${NEW_TAG}\",
                  \"newObjectId\": \"$(Build.SourceVersion)\",
                  \"oldObjectId\": \"0000000000000000000000000000000000000000\"
                }]"

              echo "Tag $NEW_TAG créé ✅"
            displayName: 'Versioning — Calcul et tag Git'

          # ── STEP 2 : Tag image Docker ──
          - bash: |
              echo "$(GHCR_PAT)" | docker login ghcr.io -u NizardV --password-stdin
              docker pull $(FULL_IMAGE):prod
              docker tag $(FULL_IMAGE):prod $(FULL_IMAGE):$(NEW_VERSION)
              docker push $(FULL_IMAGE):$(NEW_VERSION)
              echo "Image taguée $(NEW_VERSION) ✅"
            displayName: 'Tag image Docker avec version'

          # ── STEP 3 : Écriture du .env.prod sur le VPS ──
          - task: SSH@0
            displayName: 'Écriture du .env.prod'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                cat > ~/cyna-infra/docker-compose/.env.prod << EOF
                DB_PASSWORD=$DB_PWD
                JWT_SECRET_KEY=$JWT_KEY
                STRIPE_SECRET_KEY=$STRIPE_SK
                STRIPE_WEBHOOK_SECRET=$STRIPE_WH
                API_PORT=4000
                ASPNETCORE_ENVIRONMENT=Production
                EOF
                echo ".env.prod écrit ✅"
            env:
              DB_PWD:    $(DB_PASSWORD_PROD)
              JWT_KEY:   $(JWT_SECRET_KEY_PROD)
              STRIPE_SK: $(STRIPE_SECRET_KEY_PROD)
              STRIPE_WH: $(STRIPE_WEBHOOK_SECRET_PROD)

          # ── STEP 4 : Déploiement ──
          - task: SSH@0
            displayName: 'Deploy API prod'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                echo "$GHCR_PAT_ENV" | docker login ghcr.io -u NizardV --password-stdin
                cd ~/cyna-infra && git pull origin main
                cd docker-compose/
                echo "─── Pull & Relance API prod sur le port 4000 ───"
                docker compose -p cyna-prod -f docker-compose.prod.yml --env-file .env.prod pull api
                docker compose -p cyna-prod -f docker-compose.prod.yml --env-file .env.prod up -d --no-build --force-recreate api
            env:
              GHCR_PAT_ENV: $(GHCR_PAT)

          # ── STEP 5 : Health check ──
          - task: SSH@0
            displayName: 'Health check prod'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                sleep 10
                curl -f http://localhost:4000/health || exit 1