trigger: none  # Déclenché uniquement par le CI

resources:
  pipelines:
  - pipeline: ci-api
    source: 'Cyna-Api CI'        # Nom exact du pipeline CI dans Azure DevOps
    trigger:
      branches:
        include: [ "main", "dev" ]

pool:
  name: 'CyanPool'

variables:
  - group: 'GHCR'
  - name: FULL_IMAGE
    value: 'ghcr.io/nizardv/cyna-api'
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
      - name: envName
        value: 'prod'
      - name: targetEnv
        value: 'PROD'
      - name: API_PORT
        value: '4000'
      - name: ASPNETCORE_ENV
        value: 'Production'
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/dev') }}:
      - name: envName
        value: 'staging'
      - name: targetEnv
        value: 'DEV'
      - name: API_PORT
        value: '4001'
      - name: ASPNETCORE_ENV
        value: 'Staging'

stages:
- stage: CD_Cloud
  displayName: 'CD Cloud — Deploy OVH [ $(envName) ]'
  jobs:
  - deployment: Deploy
    environment: $(targetEnv)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: SSH@0
            displayName: 'Deploy API sur OVH'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                echo "$(GHCR_PAT)" | docker login ghcr.io -u NizardV --password-stdin

                # On se place dans le dossier contenant l'infra sur ton VPS OVH
                cd ~/cyna-infra
                git pull origin main
                cd docker-compose/

                echo "─── Pull de l'image de l'API ───"
                ENV_NAME=$(envName) \
                API_PORT=$(API_PORT) \
                ASPNETCORE_ENVIRONMENT=$(ASPNETCORE_ENV) \
                  docker compose -f docker-compose.$(envName).yml pull api

                echo "─── Relance du conteneur API ───"
                ENV_NAME=$(envName) \
                API_PORT=$(API_PORT) \
                ASPNETCORE_ENVIRONMENT=$(ASPNETCORE_ENV) \
                  docker compose -f docker-compose.$(envName).yml up -d --no-build --force-recreate

          - task: SSH@0
            displayName: 'Health check post-deploy'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                sleep 5
                curl -f http://localhost:$(API_PORT)/health || exit 1