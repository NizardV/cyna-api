trigger:
  branches:
    include:
      - main
      - dev

pool:
  name: 'CyanPool'

variables:
  - group: 'GHCR'
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
      - name: envName
        value: 'production'
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/dev') }}:
      - name: envName
        value: 'staging'
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/feat/ci-cd') }}:
      - name: envName
        value: 'staging'
  - name: GHCR_REGISTRY
    value: 'ghcr.io'
  - name: GHCR_NAMESPACE
    value: 'nizardv'
  - name: IMAGE_NAME
    value: 'cyna-api'
  - name: FULL_IMAGE
    value: '$(GHCR_REGISTRY)/$(GHCR_NAMESPACE)/$(IMAGE_NAME)'

stages:
- stage: CI_CD_MultiEnv
  displayName: 'CI/CD Multi-Environnements - Cyna API'
  jobs:
  - job: Build_And_Deploy
    steps:
    - task: UseDotNet@2
      displayName: 'Use .NET Core sdk'
      inputs:
        packageType: 'sdk'
        version: '10.x'

    # ── 1. Analyse statique SonarCloud ─────────────────────────────
    - task: SonarCloudPrepare@3
      displayName: 'SonarCloud : Prepare'
      inputs:
        SonarCloud: 'SonarCloud-CYNA'
        organization: '2028di1p5g3'
        scannerMode: 'dotnet'
        projectKey: '2028DI1P5G3_Cyna-Api'
        projectName: 'CYNA - Backend Web'

    - task: DotNetCoreCLI@2
      displayName: 'dotnet restore'
      inputs:
        command: 'restore'
        projects: 'CynaApi.sln'

    - task: DotNetCoreCLI@2
      displayName: 'dotnet build'
      inputs:
        command: 'build'
        projects: 'CynaApi.sln'
        arguments: '--configuration Release --no-restore'

    # ── 2. Tests unitaires ─────────────────────────────────────────
    - task: DotNetCoreCLI@2
      displayName: 'dotnet test — UnitTests'
      inputs:
        command: 'test'
        projects: 'UnitTests/UnitTests.csproj'
        arguments: '--configuration Release --no-build --collect:"XPlat Code Coverage"'
      continueOnError: true

    - task: SonarCloudAnalyze@3
      displayName: 'SonarCloud : Analyze'

    # ── 3. Login GHCR ──────────────────────────────────────────────
    - task: Docker@2
      displayName: 'Login to GHCR'
      inputs:
        command: login
        containerRegistry: 'GHCR-Cyna-Connection'

    # ── 4. Build image Docker ──────────────────────────────────────
    - script: |
        docker build \
          --no-cache \
          -t $(FULL_IMAGE):$(envName) \
          -t $(FULL_IMAGE):latest \
          -t $(FULL_IMAGE):sha-$(Build.SourceVersion) \
          -t $(FULL_IMAGE):build-$(Build.BuildId) \
          -t $(FULL_IMAGE):$(Build.SourceBranchName) \
          .
      displayName: 'Docker Build [ $(envName) ]'

    # ── 5. Run local sur l'agent (smoke test) ─────────────────────
    - script: |
        docker stop cyna-api-$(envName) 2>/dev/null || true
        docker rm   cyna-api-$(envName) 2>/dev/null || true
        if [ "$(envName)" = "production" ]; then
          echo "Démarrage de la PRODUCTION sur le port 5100..."
          docker run -d --name cyna-api-production -p 5100:8080 \
            $(FULL_IMAGE):production
        else
          echo "Démarrage du STAGING sur le port 5101..."
          docker run -d --name cyna-api-staging -p 5101:8080 \
            $(FULL_IMAGE):staging
        fi
      displayName: 'CD : Run Conteneur [ $(envName) ]'

    # ── 6. Push vers GHCR ─────────────────────────────────────────
    - script: |
        docker push $(FULL_IMAGE):$(envName)
        docker push $(FULL_IMAGE):latest
        docker push $(FULL_IMAGE):sha-$(Build.SourceVersion)
        docker push $(FULL_IMAGE):build-$(Build.BuildId)
        docker push $(FULL_IMAGE):$(Build.SourceBranchName)
      displayName: 'Push Docker Image → GHCR [ $(envName) ]'

    # ── 7. Deploy sur OVH via SSH ──────────────────────────────────
    # feat/ci-cd → même cible que staging (port 4001)
    # Ne déploie PAS sur OVH si on est sur feat/ci-cd
    # (on valide juste le build/push, le vrai déploiement attend le merge sur dev)
    - task: SSH@0
      displayName: 'Deploy sur OVH [ $(envName) ]'
      condition: >
        and(
          succeeded(),
          or(
            eq(variables['Build.SourceBranch'], 'refs/heads/main'),
            eq(variables['Build.SourceBranch'], 'refs/heads/dev'),
            eq(variables['Build.SourceBranch'], 'refs/heads/feat/ci-cd')
          )
        )
      inputs:
        sshEndpoint: 'OVH-SSH-Connection'
        runOptions: 'inline'
        failOnStdErr: false
        inline: |
          echo "$(GHCR_PAT)" | docker login ghcr.io -u NizardV --password-stdin

          if [ "$(envName)" = "production" ]; then
            API_PORT=4000
            ASPNETCORE_ENV=Production
          else
            API_PORT=4001
            ASPNETCORE_ENV=Staging
          fi

          cd ~/cyna-api

          ENV_NAME=$(envName) API_PORT=$API_PORT ASPNETCORE_ENVIRONMENT=$ASPNETCORE_ENV \
            docker compose pull api

          ENV_NAME=$(envName) API_PORT=$API_PORT ASPNETCORE_ENVIRONMENT=$ASPNETCORE_ENV \
            docker compose up -d --no-build --force-recreate